<!DOCTYPE html>
<html lang="en">
<head>
  <title>한국어 — Korean Vault</title>
  <meta charset="UTF-8">
  <meta name="author" content="Connor Stitt">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A Korean vocabulary & grammar vault, mapped as an interactive graph.">

  <link rel="stylesheet" href="korean.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="icon" href="logo.fav.png" type="image/x-icon">
</head>
<body>

  <header class="topbar">
    <a class="back-btn" href="index.html">&larr; Back to Connor's Site</a>
    <div>
      <h1>한국어 Vault</h1>
      <p class="subtitle">Korean vocabulary &amp; grammar notes, mapped as an Obsidian-style graph.</p>
    </div>
  </header>

  <main class="main">

    <div class="placeholder-notice">
      <strong>Placeholder.</strong> Sample data standing in for the real vault. Drag the nodes around — the live version will sync from Obsidian.
    </div>

    <div class="graph-card">
      <div class="graph-toolbar">
        <span>graph view &middot; local-graph.md</span>
        <span id="node-count"></span>
      </div>
      <div id="graph-wrap">
        <svg id="graph-svg"></svg>
        <div id="graph-tooltip" class="graph-tooltip"></div>
      </div>
      <div class="legend">
        <span><span class="dot dot-topic"></span>Topic</span>
        <span><span class="dot dot-vocab"></span>Vocabulary</span>
        <span><span class="dot dot-grammar"></span>Grammar</span>
      </div>
    </div>

  </main>

  <script src="korean-graph.js" defer></script>
  <script>
    window.addEventListener("load", () => {
      const el = document.getElementById("node-count");
      if (el && window.graphData) {
        el.textContent = graphData.nodes.length + " nodes · " + graphData.links.length + " links";
      }
    });
  </script>
</body>
</html>
